<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANY REQUEST PASS</title>

<style>
body{
  margin:0;
  min-height:100vh;
  overflow-x:hidden;
  font-family:sans-serif;
  color:white;
  transition:1s;
}

.wrap{
  width:90%;
  max-width:390px;
  text-align:center;
  margin:0 auto;
  padding:24px 0;
}

.ticket{
  width:100%;
  border-radius:24px;
  transition:1s;
  animation:floatTicket 3s ease-in-out infinite;
}

textarea{
  width:90%;
  margin-top:16px;
  padding:12px;
  border-radius:16px;
  border:1px solid #d946ef;
  background:#2b0036;
  color:white;
  font-size:15px;
  resize:none;
}

textarea::placeholder{
  color:#c084fc;
}

.status{
  margin-top:16px;
  font-size:22px;
  font-weight:bold;
}
#seasonTitle{
  margin-top:12px;
  margin-bottom:8px;
  font-size:22px;
  font-weight:bold;
  color:white;
  text-shadow:0 0 15px #7dd3fc;
}

button{
  margin-top:14px;
  padding:14px 34px;
  border:0;
  border-radius:999px;
  background:#d946ef;
  color:white;
  font-size:16px;
  font-weight:bold;
}
button{
  display:block;
  width:90%;
  margin:10px auto;
}
.used button{
  background:gray;
}

.used .status{
  color:#ff4b4b;
}

.used{
  background:radial-gradient(circle, #4a0000, #160000);
}

.stamp{
  display:none;
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%, -50%) rotate(-18deg);
  border:4px solid #ff4b4b;
  color:#ff4b4b;
  font-size:28px;
  font-weight:bold;
  text-align:center;
  line-height:1.3;
  padding:10px 24px;
  border-radius:12px;
  letter-spacing:4px;
  opacity:0.9;
  z-index:10;
}

.used .stamp{
  display:block;
  animation:stampPop 0.5s ease;
}

.scan-line{
  display:none;
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:4px;
  background:#ff4bff;
  box-shadow:0 0 18px #ff4bff;
  z-index:20;
}

.scanning .scan-line{
  display:block;
  animation:scanTicket 1.2s ease;
}

@keyframes scanTicket{
  0%{ top:12%; }
  100%{ top:82%; }
}

.ticket-used{
  animation:ticketUse 1s ease;
}

#nextDate{
  margin-top:12px;
  color:#c084fc;
  font-size:14px;
}

#countdown{
  margin-top:6px;
  color:#f0abfc;
  font-size:13px;
}

#message{
  margin-top:18px;
  font-size:16px;
  color:#ffb4ff;
  opacity:0;
  transition:0.5s;
}

#eventBanner{
  margin:14px auto;
  padding:14px 16px;
  border-radius:18px;
  width:90%;
  max-width:360px;
  color:#fff;
  font-size:15px;
  line-height:1.5;
  display:none;
  box-shadow:0 0 20px rgba(255,255,255,0.08);
  text-align:left;
}

#eventBanner.show{
  display:block;
  animation:stampPop 0.5s ease;
}

#eventBanner.event-star{
  background:linear-gradient(135deg,#1d4ed8,#60a5fa);
  box-shadow:0 0 25px rgba(96,165,250,.35);
}

#eventBanner.event-grass{
  background:linear-gradient(135deg,#15803d,#4ade80);

}

#eventBanner.event-stone{
  background:linear-gradient(135deg,#475569,#94a3b8);
  box-shadow:0 0 25px rgba(148,163,184,.35);
}

#eventBanner.event-gacha{
  background:linear-gradient(135deg,#7c3aed,#d946ef);
  box-shadow:0 0 25px rgba(217,70,239,.35);
}

#eventBanner.event-love{
  background:linear-gradient(135deg,#db2777,#f472b6);
  box-shadow:0 0 25px rgba(244,114,182,.35);
}

#eventBanner.event-alien{
  background:linear-gradient(135deg,#0f766e,#22d3ee);
  box-shadow:0 0 25px rgba(34,211,238,.35);
}

#eventBanner.event-jewel{
  background:linear-gradient(135deg,#0f766e,#14b8a6);
  box-shadow:0 0 25px rgba(20,184,166,.35);
}

#eventBanner.event-golden{

.event-title-pop{

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

}

.event-title-pop .small{

  letter-spacing:3px;
  margin-bottom:10px;
  opacity:.9;
}

.event-title-pop .big{
  font-size:42px;
  font-weight:900;
  line-height:1.2;
}
.start-event-effect{
  position:fixed;
  inset:0;
  z-index:9998;
  display:flex;
  justify-content: center;
  align-items: center;
  font-size: 58px;
  background: rgba(0,0,0,0.35);
  pointer-events: none;
  animation: startEventPop 1.2s ease forwards;
}
@keyframes startEventPop{
  0%{
    opacity:0;
    transform:scale(0.6);
  }
  20%{
    opacity:1;
    transform:scale(1.15);
  }
  70%{
    opacity:1;
    transform:scale(1);
  }
  100%{
    opacity:0;
    transform:scale(1.4);
  }
}

@keyframes eventTitlePop{
  0%{
    opacity:0;
    transform:scale(.75);
  }
  20%{
    opacity:1;
    transform:scale(1.05);
  }
  70%{
    opacity:1;
    transform:scale(1);
  }
  100%{
    opacity:0;
    transform:scale(1.08);
  }
}
.start-event-effect{
  position:fixed;
  inset:0;
  z-index:9998;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:58px;
  background:rgba(0,0,0,0.35);
  pointer-events:none;
  animation:startEventPop 1.2s ease forwards;
}

@keyframes startEventPop{
  0%{
    opacity:0;
    transform:scale(0.6);
  }
  30%{
    opacity:1;
    transform:scale(1.15);
  }
  70%{

  }
  100%{
    opacity:0;

  }
}
.show-message{
  opacity:1 !important;
}

.hidden{
  display:none;
}

#startScreen{
  position:fixed;
  inset:0;
  background:radial-gradient(circle, #2d0036, #120016);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.open-card{
  padding:28px 42px;
  border-radius:24px;
  border:2px solid #ff4bff;
  color:white;
  font-size:24px;
  font-weight:bold;
  letter-spacing:4px;
  box-shadow:0 0 30px #ff4bff;
  animation:pulseOpen 1.5s infinite;
}

.particle{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:999px;
  background:#ff4bff;
  pointer-events:none;
  animation:floatParticle linear infinite;
}

@keyframes floatTicket{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-10px);  }
  100%{ transform:translateY(0); }
}

@keyframes ticketUse{
  0%{ transform:scale(1) rotateY(0deg); }
  30%{ transform:scale(0.95) rotateY(0deg); }
  60%{ transform:scale(1.05) rotateY(90deg); }
  100%{ transform:scale(1) rotateY(0deg); }
}

@keyframes stampPop{
  0%{ transform:translate(-50%, -50%) rotate(-18deg) scale(2); opacity:0; }
  100%{ transform:translate(-50%, -50%) rotate(-18deg) scale(1); opacity:0.9; }
}

@keyframes scanMove{
  0%{ top:25%; }
  100%{ top:72%; }
}

@keyframes pulseOpen{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.08); }
  100%{ transform:scale(1); }
}

@keyframes floatParticle{
  0%{ transform:translateY(100vh); opacity:0; }
  20%{ opacity:1; }
  100%{ transform:translateY(-120vh); opacity:0; }
}

@keyframes fadePremium{
  0%{ opacity:0; transform:scale(1.4); }
  20%{ opacity:1; transform:scale(1); }
  80%{ opacity:1; }
  100%{ opacity:0; transform:scale(0.9); }
}

.season-emoji{
  position:fixed;
  top:-40px;
  pointer-events:none;
  z-index:1;
  animation:seasonFall linear forwards;
}

@keyframes seasonFall{
  0%{
    transform:translateY(-40px) rotate(0deg);
    opacity:0;
  }
  15%{
    opacity:1;
  }
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

.background-flash{
  animation:bgFlash 1.2s ease;
}

@keyframes bgFlash{
  0%{ filter:brightness(1); }
  50%{ filter:brightness(1.35); }
  100%{ filter:brightness(1); }
}
.whack-area{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:18px auto;
  max-width:320px;
}

.whack-cell{

  background:#2b0036;
  font-size:34px;
  box-shadow:0 0 14px rgba(217,70,239,.25);
}

.whack-cell.hit{
  background:#14532d;
  box-shadow:0 0 25px rgba(74,222,128,.5);
}
.mine-board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:18px auto;
  max-width:320px;

}

.mine-cell{
  aspect-ratio:1/1;
  border:none;
  border-radius:18px;
  background:#581c87;
  color:white;
  font-size:34px;
  box-shadow:0 0 14px rgba(217,70,239,.3);

}

.mine-cell:active{
  transform:scale(.94);
}

.mine-cell.opened{

}

.game-full{
  position:fixed;
  inset:0;
  z-index:9999;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

}

.game-panel{
  width:90%;
  max-width:360px;
}

.heart-area{

  border-radius:24px;
  background:rgba(255,255,255,0.08);
  overflow:hidden;
  box-shadow:0 0 24px rgba(244,114,182,.25);
  margin:12px auto;
}

.falling-heart{
  position:absolute;
  font-size:34px;
  animation:heartFall linear forwards;
}

@keyframes heartFall{
  from{ top:-40px; }
  to{ top:440px; }
}

.slot-box{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:20px 0;
}

.slot-reel{
  width:80px;
  height:80px;
  border-radius:18px;
  background:#2b0036;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  box-shadow:0 0 18px rgba(217,70,239,.35);
}

.memory-board{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  width:260px;
  margin:20px auto;
}

.memory-board.hard{
  grid-template-columns:repeat(4,1fr);
  width:340px;
  max-width:92vw;
}

.memory-board.hard .memory-cell{

}

.memory-cell{

  border:none;
  border-radius:22px;
  background:#312e81;
  color:white;
  font-size:34px;
  box-shadow:0 0 18px rgba(129,140,248,.35);
}

.memory-cell.active{

}
.tab-menu{
  position:sticky;
  bottom:0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-top:18px;
  padding:8px;
  background:rgba(0,0,0,.25);
  backdrop-filter:blur(8px);
  border-radius:18px;
  z-index:50;
}

.tab-menu button{
  width:auto;
  margin:0;
  padding:10px 4px;

}
.tab-content{
  display:none;

}

.tab-content.active{

}
.tab-btn.active{
  background:linear-gradient(135deg,#f0abfc,#d946ef);

  transform:translateY(-2px);
}

.month-card{
  width:90%;
  max-width:360px;
  margin:18px auto 20px;
  padding:18px 18px 14px;

.month-row span{

}

.month-row strong{

}
.game-list{

}

.game-list button{

}

.game-list button span{

<body>

<div id="startScreen">
  <div class="open-card">TAP TO OPEN</div>
</div>

<div class="wrap hidden" id="app">

  <div class="stamp">REQUEST RECEIVED ♡</div>

  <audio id="scanSound" src="scan.mp3"></audio>

  <div class="ticket-wrap">
    <img src="ticket-active.png" class="ticket" id="ticketImage">
    <div class="scan-line"></div>
  </div>

  <div id="seasonTitle"></div>
  
  <div class="status" id="status">ACTIVE</div>
  <div id="nextDate"></div>
  <div id="countdown"></div>
  <div id="message"></div>
  <div id="eventBanner"></div>

  
  <div class="tab-content active" id="tab-home">

    <div class="home-card">
      <div class="home-title">ANY REQUEST PASS</div>
      <div class="home-sub" id="homeTodayText">今日も起動ありがとう♡</div>
  
      <div class="home-status-grid">
        <div>
          <span>PASS</span>
          <strong id="homePassText">ACTIVE</strong>
        </div>
        <div>
          <span>EVENT</span>
          <strong id="homeEventText">なし</strong>
        </div>
        <div>
          <span>👽 POINT</span>
          <strong id="homePointText">0</strong>
        </div>
        <div>
          <span>🌱 GRASS</span>
          <strong id="homeGrassText">0</strong>
        </div>
      </div>
    </div>
  
    <div class="home-menu">
      <button type="button" onclick="showTab('tab-pass')">🎫<br>PASS</button>
      <button type="button" onclick="showTab('tab-game')">🎮<br>GAME</button>
      <button type="button" onclick="showTab('tab-shop')">🎰<br>SHOP</button>
      <button type="button" onclick="showTab('tab-status')">📊<br>STATUS</button>
    </div>
  
  </div>
  <div class="tab-content " id="tab-pass">

    <button type="button" class="ghost-btn" onclick="showTab('tab-home')">← HOME</button>

    <div id="monthCard" class="month-card">
      <div class="month-title">📅 今月の状況</div>
  
      <div class="month-row">
        <span>STATUS</span>
        <strong id="monthStatusText">ACTIVE</strong>
      </div>

async function useTicket(){

    alert("お願い内容を書いてね！");

    "このお願い内容で\n今月分を使用しますか？\n\n" + request

    return;
  }

  const formData = new FormData();

  formData.append("form-name", "request-pass");
  formData.append("request", request);
  formData.append("date", new Date().toLocaleString());

  await fetch("https://formspree.io/f/mzdwkndw", {
    method:"POST",
    body:formData,
    headers:{
      "Accept":"application/json"
    }
  });

  sound.play();

  if(navigator.vibrate){
    navigator.vibrate([120, 50, 120]);
  }

    localStorage.setItem("usedMonth", thisMonth);
    localStorage.setItem("requestText", request);

    app.classList.remove("scanning");

    setUsed(true);

    setTimeout(() =>{
      showBonusBoxes();
    },1600);

  }, 1200);
}

const board = document.getElementById("mineBoard");

for(let i=0; i<9; i++){

  const cell = document.createElement("button");

  cell.className = "mine-cell";
  cell.textContent = "🎁";

  cell.onclick = () => {

    if(finished || cell.classList.contains("opened")){
      return;
    }

    cell.classList.add("opened");

    if(i === bombIndex){

      cell.textContent = "💣";

      unlockAchievement(

      setTimeout(()=>{
        showBombExplosion();
        alert("💥 BOOM！\n\n爆弾を引きました…");

        updateInventory();

        setTimeout(()=>{

          game.remove();
        },500);
      }
    }
  };

  board.appendChild(cell);
}

document.getElementById("diceRollBtn").onclick = () => {

  if(rolling){
    return;
  }

  rolling = true;

  let count = 0;

  const roll = setInterval(()=>{

    diceDisplay.textContent =
      diceFaces[Math.floor(Math.random()*6)];

    count++;

    if(count >= 18){

      clearInterval(roll);

      const dice = Math.floor(Math.random()*6) + 1;
      diceDisplay.textContent = diceFaces[dice - 1];

      setTimeout(()=>{

        if(dice === 6){

          cloverCount++;
          localStorage.setItem("cloverCount", cloverCount);

          alert("🎲 6！大当たり！\n\n🍀 四つ葉のクローバー GET!");

        }else if(dice >= 4){

          stoneCount++;
          localStorage.setItem("stoneCount", stoneCount);

          alert("🎲 " + dice + "！\n\n🪨 石ころ +1");

        }else{

          grassCount++;
          localStorage.setItem("grassCount", grassCount);

          alert("🎲 " + dice + "！\n\n🌱 雑草 +1");
        }

        updateInventory();
        game.remove();

      },500);
    }

  },80);
};

document.getElementById("diceEndBtn").onclick = () => {

};

function heartCatchGame(){

const game = document.createElement("div");
game.className = "game-full";
game.style.background = "radial-gradient(circle,#be185d,#020617)";

let score = 0;
let combo = 0;
let timeLeft = 12;
let timer = null;
let heartTimer = null;
let dropSpeed = 420;

game.innerHTML = `
  <div class="game-panel">
    <h2>💖 ハートキャッチ HARD 💖</h2>
    <p>💖をタップ！🖤は押しちゃダメ！</p>
    <p>
      TIME：<span id="heartTime">12</span>
      SCORE：<span id="heartScore">0</span>
      COMBO：<span id="heartCombo">0</span>
    </p>
    <div class="heart-area" id="heartArea"></div>
    <button type="button" id="heartEndBtn">やめる</button>
  </div>
`;

document.body.appendChild(game);

const area = document.getElementById("heartArea");

function dropHeart(){

  const heart = document.createElement("div");
  heart.className = "falling-heart";

  const r = Math.random();

  if(r < 0.15){
    heart.textContent = "💎";
  }else if(r < 0.35){
    heart.textContent = "🖤";
  }else{
    heart.textContent = "💖";
  }

  heart.style.left = Math.random() * 85 + "%";
  heart.style.animationDuration = (1.1 + Math.random()*0.8) + "s";

  heart.onclick = () => {

    if(heart.textContent === "🖤"){

      score = Math.max(0, score - 3);
      combo = 0;

      document.getElementById("heartScore").textContent = score;
      document.getElementById("heartCombo").textContent = combo;

      heart.textContent = "💥";
      heart.style.pointerEvents = "none";

      return;
    }

    combo++;

    if(heart.textContent === "💎"){
      score += 5 + Math.floor(combo / 5);
    }else{
      score += 1 + Math.floor(combo / 5);
    }

    document.getElementById("heartScore").textContent = score;
    document.getElementById("heartCombo").textContent = combo;

    heart.textContent = "✨";
    heart.style.pointerEvents = "none";

    setTimeout(()=>{
      heart.remove();
    },120);
  };

  area.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },2500);
}

heartTimer = setInterval(dropHeart, dropSpeed);

timer = setInterval(()=>{

  timeLeft--;
  document.getElementById("heartTime").textContent = timeLeft;

  if(timeLeft === 7){
    clearInterval(heartTimer);
    dropSpeed = 300;
    heartTimer = setInterval(dropHeart, dropSpeed);
  }

  if(timeLeft === 4){
    clearInterval(heartTimer);
    dropSpeed = 220;
    heartTimer = setInterval(dropHeart, dropSpeed);
  }

  if(timeLeft <= 0){
    endHeartGame();
  }

},1000);

document.getElementById("heartEndBtn").onclick = () => {
  endHeartGame();
};

function endHeartGame(){

  clearInterval(timer);
  clearInterval(heartTimer);

  const bonus = Math.floor(score / 10);
  spacePoints += score;
  grassCount += bonus;

  localStorage.setItem("spacePoints", spacePoints);
  localStorage.setItem("grassCount", grassCount);

  updateInventory();

  alert(
    "💖 結果発表！\n\n" +
    "SCORE：" + score + "\n" +
    "MAX COMBO：" + combo + "\n" +
    "👽 宇宙ポイント +" + score + "\n" +
    "🌱 雑草 +" + bonus
  );

  game.remove();
}
}

function memoryGame(){

const game = document.createElement("div");
game.className = "game-full";
game.style.background = "radial-gradient(circle,#1e1b4b,#020617)";
const symbols = [
  "💜","🌱","👽","💎",
  "🎀","🪨","🌙","🎲",
  "✨","🍀","🦖","🌠"
];
let sequence = [];
let player = [];
let level = 1;
let clickable = false;
let miss = 0;

game.innerHTML = `
  <div class="game-panel">
    <h2>🧠 記憶ゲーム HARD 🧠</h2>
    <p>光った順番を覚えてタップ！</p>
    <p>LEVEL：<span id="memoryLevel">1</span>　MISS：<span id="memoryMiss">0</span>/3</p>
    <div class="memory-board hard" id="memoryBoard"></div>
    <button type="button" id="memoryStartBtn">START</button>
    <button type="button" id="memoryEndBtn">やめる</button>
  </div>
`;

document.body.appendChild(game);

const board = document.getElementById("memoryBoard");

for(let i=0; i<12; i++){

  const cell = document.createElement("button");
  cell.className = "memory-cell";
  cell.textContent = symbols[i];

  cell.onclick = () => {
    if(!clickable) return;

    player.push(i);
    flashCell(i);

    const idx = player.length - 1;

    if(player[idx] !== sequence[idx]){
      miss++;
      document.getElementById("memoryMiss").textContent = miss;
      player = [];

      if(miss >= 3){
        endMemoryGame(false);
        return;
      }

      clickable = false;
      setTimeout(()=>{
        replaySequence();
      },700);
      return;
    }

    if(player.length === sequence.length){
      clickable = false;
      level++;
      document.getElementById("memoryLevel").textContent = level;

      if(level > 10){
        endMemoryGame(true);
        return;
      }

      setTimeout(nextRound,800);
    }
  };

  board.appendChild(cell);
}

document.getElementById("memoryStartBtn").onclick = () => {
  level = 1;
  miss = 0;
  sequence = [];
  player = [];
  document.getElementById("memoryLevel").textContent = level;
  document.getElementById("memoryMiss").textContent = miss;
  nextRound();
};

document.getElementById("memoryEndBtn").onclick = () => {
  game.remove();
};

function nextRound(){
  player = [];
  sequence = [];

  // レベル1でも最初から5回光る
  const length = 4 + level;

  for(let i=0; i<length; i++){
    sequence.push(Math.floor(Math.random()*12));
  }

  replaySequence();
}

function replaySequence(){

  player = [];
  clickable = false;

  let i = 0;

  // レベルが上がるほど速くなる
  const speed = Math.max(160, 360 - level * 25);

  const show = setInterval(()=>{

    flashCell(sequence[i]);
    i++;

    if(i >= sequence.length){
      clearInterval(show);
      setTimeout(()=>{
        clickable = true;
      },300);
    }

  },speed);
}

function flashCell(index){
  const cells = board.querySelectorAll(".memory-cell");
  cells[index].classList.add("active");

  setTimeout(()=>{
    cells[index].classList.remove("active");
  },100);
}

function endMemoryGame(clear){

  if(clear){
    spacePoints += 20;
    jewelCount += 2;
    grassCount += 5;

    localStorage.setItem("spacePoints", spacePoints);
    localStorage.setItem("jewelCount", jewelCount);
    localStorage.setItem("grassCount", grassCount);

    updateInventory();

    alert(
      "🎉 PERFECT CLEAR！\n\n" +
      "👽 宇宙ポイント +20\n" +
      "💎 きれいな石 +2\n" +
      "🌱 雑草 +5"
    );
  }else{

    // 到達レベルに応じて報酬
    const reward = Math.max(1, level - 1);
    spacePoints += reward;
    localStorage.setItem("spacePoints", spacePoints);
    updateInventory();

    alert(
      "🧠 GAME OVER\n\n" +
      "到達LEVEL：" + level + "\n" +
      "👽 宇宙ポイント +" + reward
    );
  }

  game.remove();
}
}

function nextRound(){

  player = [];
  sequence.push(Math.floor(Math.random()*4));

  let i = 0;
  clickable = false;

  const show = setInterval(()=>{

    flashCell(sequence[i]);
    i++;

    if(i >= sequence.length){
      clearInterval(show);
      setTimeout(()=>{
        clickable = true;
      },400);
    }

  },650);
}

function flashCell(index){

  const cells = board.querySelectorAll(".memory-cell");
  cells[index].classList.add("active");

  setTimeout(()=>{
    cells[index].classList.remove("active");
  },300);
}

function updateMonthCard(){

const monthStatus = document.getElementById("monthStatusText");
const monthNext   = document.getElementById("monthNextText");
const monthEvent  = document.getElementById("monthEventText");
const monthEffect = document.getElementById("monthEffectText");

if(!monthStatus || !monthNext || !monthEvent || !monthEffect){
  return;
}

const now = new Date();
const thisMonth = now.getFullYear() + "-" + (now.getMonth()+1);
const usedMonth = localStorage.getItem("usedMonth");

// ===== STATUS =====
if(usedMonth === thisMonth){
  monthStatus.textContent = "USED";
}else{
  monthStatus.textContent = "ACTIVE";
}

// ===== NEXT =====
const next = new Date(now.getFullYear(), now.getMonth()+1, 1);
monthNext.textContent = next.toLocaleDateString();

// ===== EVENT / EFFECT =====
const banner = document.getElementById("eventBanner");

if(banner && banner.innerText.trim() !== ""){
  const lines = banner.innerText.trim().split("\n");

  // 1行目 → イベント名
  monthEvent.textContent = lines[0] || "なし";

  // 2行目以降を効果としてまとめる
  if(lines.length >= 2){
    monthEffect.textContent = lines[lines.length - 1] || "なし";
  }else if(localStorage.getItem("goldenDay") === "true"){
    monthEffect.textContent = "🎁 もう1回お願い券が出やすい";
  }else{
    monthEffect.textContent = "なし";
  }

}else{
  monthEvent.textContent = "なし";

  if(localStorage.getItem("goldenDay") === "true"){
    monthEffect.textContent = "🎁 もう1回お願い券が出やすい";
  }else{
    monthEffect.textContent = "なし";
  }
}
}

  joke.style.background =
    "rgba(0,0,0,0.85)";
  joke.style.zIndex = "9999";
  joke.style.textAlign = "center";

  document.body.appendChild(joke);

  setTimeout(()=>{
    joke.remove();
  },3000);
}

startScreen.onclick = () => {

if(opened){
  return;
}

opened = true;

app.classList.remove("hidden");
startScreen.style.display = "none";

  showFortune();
